<body>
    <script>
        console.log(1 + 1)//2
        console.log("human" + 1)//human1
        console.log("1" + 1)//11
        console.log(1 - "1")//0
        //隐式转换
        console.log(+"123")//123,转换为数字型
        
        //显示转换
        let str='123'
        console.log(typeof (Number(str)))//number
        console.log(Number('pink'))//NaN
        
    </script>
