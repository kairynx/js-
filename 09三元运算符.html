<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //三元运算符
        //条件？满足条件执行的代码：不满足条件执行的代码
        console.log(10 > 5 ? "是" : "否")
        //是不是？是：不是
        let num=Number(prompt("请输入一个数字:"))
        let num1=Number(prompt("请输入一个数字:"))
        alert(num > num1 ? `${num}大于${num1}` : `${num1}大于${num}`)
        //num > num1 ? alert(`${num}大于${num1}`) : alert(`${num1}大于${num}`)
    </script>
</body>
</html>
