<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        //1.用户输入
        let num=Number(prompt("请输入一个数字:"))

        num >= 0 && num <= 9 ? alert(`0${num}`) : alert(num)
    </script>
