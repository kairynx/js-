<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(let i=0;i<10;i++){
            document.write("hello world<br>")
        }
        //1.利用for循环输出1~100岁
        for(let i=1;i<=100;i++){
            document.write(i+"岁<br>")
        }
        //2.求1-100之间所有的偶数和
        let sum=0
        for(let i=1;i<=100;i++){
            if(i%2==0){
                sum+=i
            }
        }
        document.write("1-100之间所有的偶数和为："+sum)
    </script>
</body>
</html>
