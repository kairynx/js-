<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //页面输出1到100
        let i=1
        while(i<=100){
            document.write(`这是第${i}个数字`+'<br>')
            i++
        }
        //1到100的和
        let sum=0
        let s=0
        while(sum<=100){
            s=sum+s
            sum++
        }
        document.write(`1到100的和是${s}`)
        //1到100的偶数和
        let sum1=0
        let s1=0
        while(sum1<=100){
            if(sum1%2==0){
                s1=s1+sum1
            }
            sum1++
        }
        document.write(`1到100的偶数和是${s1}`)
    </script>
</body>
</html>
