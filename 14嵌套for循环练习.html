<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(let i=1;i<=3;i++){
            document.write(`今天是第${i}天`+"<br>")
            for(let j=1;j<=5;j++){
                document.write(`第${i}天记住了${j}个单词`+"<br>")
            }
        }
        let num=prompt("请输入行数:")
        let num1=prompt("请输入列数:")
        for(let i=1;i<=num;i++){
            for(let j=1;j<=num1;j++){
                document.write("*")
            }
            document.write("<br>")
        }
        for(let i=1;i<=5;i++){
            for(let j=1;j<=i;j++){
                document.write("*")
            }
            document.write("<br>")
        }
    </script>
</body>
</html>
