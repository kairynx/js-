<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    //需求:用户可以选择存钱、取钱、查看余额和退出功能分析
    // 1:循环的时候，需要反复提示输入框，所以提示框写到循环里面
    // 2:退出的条件是用户输入了4，如果是4，则结束循环，不在弹窗
    // 提前准备一个金额预先存储一个数额
    // 取钱则是减法操作，存钱则是加法操作，查看余额则是直接显示金额输入不同的值
    // 可以使用switch来执行不同的操作
    let amount=0
    while(true){
        let kind=prompt(`请选择你要进行的操作：
        1.存钱 
        2.取钱 
        3.查看余额 
        4.退出`)
        if(kind==4){
            break
        }
        switch(kind){
            case "1":
                let money1=Number(prompt("请输入你要存钱的金额："))
                amount=amount+money1
                alert(`你当前的余额是${amount}`)
                break
            case "2":
                let money2=Number(prompt("请输入你要取钱的金额："))
                if(money2>amount){
                    alert("你余额不足")
                }else{
                    amount=amount-money2
                    alert(`你当前的余额是${amount}`)
                }
                break
            case "3":
                alert(`你当前的余额是${amount}`)
                break
            default:
                alert("你输入的操作有误")
                break
        }
    }
    </script>
</body>
</html>
