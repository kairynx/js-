<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: #f5f5f5;
        }
        .box{
            display: flex;
            width: 700px;
            height: 300px;
            border-left: 1px solid pink;
            border-bottom: 1px solid pink;
            margin: 50px auto;
            justify-content: space-around;
            align-items: flex-end;/*垂直居中*/
            text-align: center;}
        .box>div {
            display: flex;
            width: 50px;
            background-color: pink;
            flex-direction: column;
            justify-content: space-between;}
        .box div span{
            margin-top:-20px;
        }
        .box div h4 {margin-bottom: -35px;
            width: 70px;
            margin-left: -10px;}
    </style>
</head>
<body>
    
    <script>
        //1.四次弹窗
        //声明新数组
        let arr=[];
        for(let i=1;i<=4;i++){
            //let height=prompt(`第${i}季度的销售额是:`)
            arr.push(Number(prompt(`第${i}季度的销售额是:`)))
        }
        ///document.write(arr)
        //2.渲染柱形图
        //盒子开头
        document.write(`<div class="box">`)
       
        //盒子中间
        for(let i=0;i<arr.length;i++){
            document.write(`<div style="height: ${arr[i]}px;">
                    <span>${arr[i]}</span>
                    <h4>第${i+1}季度</h4>
                    </div>`)
        }
        //盒子结尾
        document.write(`</div>`)
    </script>
</body>
</html>
