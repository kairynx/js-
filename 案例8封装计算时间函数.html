<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        function getTime(){
            let second = Number(prompt("请输入时间秒数"))
            let h=parseInt(second/60/60%24)
            let m=parseInt(second/60%60)
            let s=parseInt(second%60)
            
            h=h<10?"0"+h:h
            m=m<10?"0"+m:m
            s=s<10?"0"+s:s
            document.write(`当前时间为:${h}时${m}分${s}秒`)
            return JSON.stringify([h,m,s])
        }
        console.log(getTime())
    </script>
</body>
</html>
