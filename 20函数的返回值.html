<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #result{
            font-size: 30px;
        }
        div{
width: 50px;
height: 50px;
background-color: pink;
margin: 100px auto;}
    </style>
</head>
<body>
    <div id="result">
    </div>
    <script>
        function sum(a,b){
            return a+b
        }
        console.log(sum(1,2))//sum()调用者，相当于sum(1,2)=3
        // 函数返回值练习
        // 1.求任意2个数中的最大值，并返回
        // 2.求任意数组中的最大值并返回这个最大值
        // 3.求任意数组中的最小值并返回这个最小值
        function max(a,b){
            return a>b?a:b
        }
        console.log(max(1,2))//1

        function min(a,b){
            return a<b?a:b
        }
        console.log(min(1,2))//1

        function max(arr){
            let max=arr[0]
            for(let i=0;i<arr.length;i++){
                if(arr[i]>max){
                    max=arr[i]
                }
            }
            return max
        }
        console.log(max([1,2,3,4,5]))//5

        function min(arr){
            let min=arr[0]
            for(let i=0;i<arr.length;i++){
                if(arr[i]<min){
                    min=arr[i]
                }
            }
            return min
        }
        console.log(min([1,2,3,4,5]))//1

    </script>
    
</body>
</html>
